<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTS 1600 VSD – Pre-Work Brief | Salesforce Field Service Einstein</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    // Inline SVG icon components (subset of lucide)
    const Icon = ({ d, size = 20, className = '', strokeWidth = 2, fill = 'none' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        {Array.isArray(d) ? d.map((path, i) => <path key={i} d={path} />) : <path d={d} />}
      </svg>
    );

    const icons = {
      ChevronLeft: () => <Icon size={16} d="M15 18l-6-6 6-6" />,
      X: ({size=24}) => <Icon size={size} d="M18 6L6 18M6 6l12 12" />,
      Calendar: ({size=20}) => <Icon size={size} d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z" />,
      Box: ({size=20}) => <Icon size={size} d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z" />,
      LayoutDashboard: ({size=20}) => <Icon size={size} d={["M3 3h7v9H3zM14 3h7v5h-7zM14 12h7v9h-7zM3 16h7v5H3z"]} />,
      Bell: ({size=20}) => <Icon size={size} d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />,
      User: ({size=20}) => <Icon size={size} d={["M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2","M12 11a4 4 0 100-8 4 4 0 000 8z"]} />,
      Zap: ({size=16, className=''}) => <Icon size={size} className={className} fill="currentColor" d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
      ClipboardCheck: ({size=24}) => <Icon size={size} d={["M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2","M9 5a2 2 0 002 2h2a2 2 0 002-2","M9 5a2 2 0 012-2h2a2 2 0 012 2","M9 12l2 2 4-4"]} />,
      RefreshCw: ({size=14}) => <Icon size={size} d={["M23 4v6h-6","M1 20v-6h6","M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"]} />,
      Volume2: ({size=20}) => <Icon size={size} d={["M11 5L6 9H2v6h4l5 4V5z","M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"]} />,
      Square: ({size=20, className=''}) => <Icon size={size} className={className} d="M3 3h18v18H3z" />,
      Signal: ({size=12}) => <Icon size={size} d={["M2 20h.01","M7 20v-4","M12 20V10","M17 20V4"]} />,
      Wifi: ({size=12}) => <Icon size={size} d={["M5 12.55a11 11 0 0114.08 0","M1.42 9a16 16 0 0121.16 0","M8.53 16.11a6 6 0 016.95 0","M12 20h.01"]} />,
      Battery: ({size=12}) => <Icon size={size} d={["M17 7H7a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2V9a2 2 0 00-2-2z","M22 11v2"]} />,
    };

    const App = () => {
      const [view, setView] = useState('brief');
      const [skillLevel, setSkillLevel] = useState('standard');
      const [isSpeaking, setIsSpeaking] = useState(false);

      const scenario = {
        title: "PTS 1600 VSD (Oil-Free Air)",
        criticality: "Today's job is critical, please read carefully.",
        overview: "You are scheduled at the BASF Antwerp site this morning to address a sudden pressure loss on the primary rental air backup unit.",
        asset: "PTS-1600-VSD-T4F",
        serial: "AC-RT-88421",
        performWork: "The unit is currently in 'Limp Mode'. You must perform a full inspection of the 2nd stage seals. Ensure you follow Site Safety Protocol Level 4 (Chemical PPE). If vibration persists after seal replacement, Einstein recommends escalating for a Unit Swap to maintain plant uptime.",
        iotAnomaly: "📉 Sudden 15% drop in discharge pressure detected. High vibration on 2nd stage element (Sensor 7A). Oil temp peaking at 98°C.",
        recentHistory: "🛠️ Mar 02: Hose coupling replacement. Feb 12: Standard 500h service completed.",
        onSiteFleet: [
          "🔍 1x CD 550+ Dryer (SN: 992) - Einstein suggests checking the Dryer drain.",
          "🔍 1x QAS 250 Generator (SN: 112) - Check fuel levels for client.",
          "🔍 2x PNS 1250 High-Pressure Pumps - Visual check on hoses."
        ],
        parts: [
          { name: "2nd Stage Seal Kit", qty: "1" },
          { name: "Synthetic Oil (Rotary)", qty: "5L" },
          { name: "Coupling O-Ring", qty: "2" }
        ],
        benefit: "Natural sounding audio and scannable lists allow technicians to process complex asset intelligence without taking their eyes off the equipment during high-pressure repairs."
      };

      const toggleSkill = () => {
        setView('loading');
        setTimeout(() => {
          setSkillLevel(s => s === 'standard' ? 'low' : 'standard');
          setView('brief');
        }, 800);
      };

      const handleReadAloud = () => {
        if (isSpeaking) {
          window.speechSynthesis.cancel();
          setIsSpeaking(false);
          return;
        }

        if (!window.speechSynthesis) {
          alert('Sorry, your browser does not support text-to-speech.');
          return;
        }

        const cleanText = (t) => t.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');

        const textToRead = `
          Pre-work brief for ${scenario.title}.
          ${cleanText(scenario.criticality)}
          Overview: ${cleanText(scenario.overview)}
          Work instruction: ${cleanText(scenario.performWork)}
          IoT alerts: ${cleanText(scenario.iotAnomaly)}
          Repair history: ${cleanText(scenario.recentHistory)}
          Other assets on site for visual inspection: ${scenario.onSiteFleet.map(i => cleanText(i)).join('. ')}
        `;

        const utterance = new SpeechSynthesisUtterance(textToRead);
        utterance.rate = 0.95;
        utterance.pitch = 1;
        utterance.volume = 1;

        // Try to pick a good English voice
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google'))
          || voices.find(v => v.lang === 'en-GB')
          || voices.find(v => v.lang.startsWith('en'))
          || voices[0];
        if (preferred) utterance.voice = preferred;

        utterance.onend = () => setIsSpeaking(false);
        utterance.onerror = () => setIsSpeaking(false);

        setIsSpeaking(true);
        window.speechSynthesis.speak(utterance);
      };

      const StatusBar = () => (
        <div className="flex justify-between items-center px-6 py-2 text-xs font-bold text-white bg-pink-700">
          <span>9:41</span>
          <div className="flex gap-1 items-center">
            <icons.Signal />
            <icons.Wifi />
            <icons.Battery />
          </div>
        </div>
      );

      const BottomNav = () => (
        <div className="flex justify-around items-center border-t py-2 bg-white sticky bottom-0 z-10">
          {[
            { Icon: icons.Calendar, label: 'Schedule', active: true },
            { Icon: icons.Box, label: 'Inventory' },
            { Icon: icons.LayoutDashboard, label: 'Dashboard' },
            { Icon: icons.Bell, label: 'Notifications' },
            { Icon: icons.User, label: 'Profile' },
          ].map(({ Icon, label, active }) => (
            <div key={label} className={`flex flex-col items-center ${active ? 'text-pink-700' : 'text-gray-400'}`}>
              <Icon size={20} />
              <span className="text-[10px]">{label}</span>
            </div>
          ))}
        </div>
      );

      return (
        <div style={{ fontFamily: "'DM Sans', sans-serif" }} className="flex flex-col h-screen max-w-sm mx-auto bg-gray-100 shadow-2xl overflow-hidden relative" >
          <StatusBar />

          {view === 'loading' && (
            <div className="flex-1 flex flex-col items-center justify-center bg-white p-8 text-center">
              <div className="relative mb-6">
                <div className="w-16 h-16 rounded-full border-4 border-pink-100 border-t-pink-600 animate-spin"></div>
                <div className="absolute inset-0 flex items-center justify-center">
                  <icons.Zap size={24} className="text-pink-600 animate-pulse" />
                </div>
              </div>
              <p className="text-slate-500 text-sm">Einstein is updating context...</p>
            </div>
          )}

          {(view === 'brief' || view === 'benefit') && (
            <div className="flex-1 flex flex-col bg-slate-900 relative overflow-hidden">
              <div className="absolute top-0 w-full p-4 opacity-40">
                <div className="flex items-center mb-4 text-white">
                  <icons.ChevronLeft />
                  <div className="flex-1">
                    <p className="text-[10px] uppercase font-bold">Work Order</p>
                    <h2 className="text-lg font-bold truncate">PTS 1600 VSD...</h2>
                  </div>
                </div>
              </div>

              <div className="mt-8 bg-white rounded-t-3xl flex-1 flex flex-col shadow-2xl z-10 overflow-hidden">
                <div className="p-6 pb-2">
                  <button className="p-1 hover:bg-slate-100 rounded-full transition-colors">
                    <icons.X size={24} />
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto no-scrollbar px-6 pb-32">
                  <div className="mb-6">
                    <h1 className="text-2xl font-black text-slate-900 mb-2">{scenario.title}</h1>
                    <p className="text-slate-800 text-sm font-medium leading-tight mb-3 italic underline decoration-pink-200 underline-offset-4">{scenario.criticality}</p>
                    {skillLevel === 'low' && (
                      <p className="text-xs font-bold text-orange-700 bg-orange-50 p-2 rounded-lg border border-orange-100 mb-4">
                        ⚠️ Skill Warning: Technician certification for PTS VSD units has expired. Please refer to SharePoint manuals attached below.
                      </p>
                    )}
                  </div>

                  <div className="mb-6">
                    <h2 className="text-lg font-bold text-slate-900 mb-2">Overview:</h2>
                    <p className="text-sm text-slate-700 leading-relaxed">{scenario.overview}</p>
                  </div>

                  <div className="mb-6">
                    <h2 className="text-lg font-bold text-slate-900 mb-2">Perform Work:</h2>
                    <p className="text-sm text-slate-700 leading-relaxed">
                      The work will be on an <strong>Atlas Copco {scenario.asset}</strong>, serial number <strong>{scenario.serial}</strong>. {scenario.performWork}
                    </p>
                  </div>

                  <div className="mb-8 space-y-6">
                    <div>
                      <h3 className="text-sm font-bold text-slate-900 mb-1">IoT Anomalies:</h3>
                      <p className="text-sm text-slate-700 leading-relaxed">{scenario.iotAnomaly}</p>
                    </div>
                    <div>
                      <h3 className="text-sm font-bold text-slate-900 mb-1">Last 6 Month Repair History:</h3>
                      <p className="text-sm text-slate-700 leading-relaxed">{scenario.recentHistory}</p>
                    </div>
                    <div>
                      <h3 className="text-sm font-bold text-slate-900 mb-1">Other assets on site for quick visual inspection:</h3>
                      <ul className="text-sm text-slate-700 space-y-2 mt-2">
                        {scenario.onSiteFleet.map((item, idx) => (
                          <li key={idx} className="flex gap-2">
                            <span className="text-slate-400">•</span>
                            <span>{item}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </div>

                  <div className="mb-8">
                    <h2 className="text-lg font-bold text-slate-900 mb-3">Parts Breakdown</h2>
                    <div className="border border-slate-200 rounded-xl overflow-hidden">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="bg-slate-50 border-b border-slate-200">
                            <th className="p-3 text-left font-bold text-slate-900">Part</th>
                            <th className="p-3 text-left font-bold text-slate-900">Quantity</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {scenario.parts.map((p, i) => (
                            <tr key={i}>
                              <td className="p-3 text-slate-700">{p.name}</td>
                              <td className="p-3 text-slate-900 font-medium">{p.qty}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <button onClick={handleReadAloud} className={`w-full py-4 border-2 rounded-xl flex justify-center items-center gap-2 font-bold transition-all mb-4 ${isSpeaking ? 'border-cyan-600 bg-cyan-50 text-cyan-700' : 'border-cyan-600 text-cyan-600 hover:bg-cyan-50'}`}>
                    {isSpeaking ? (<><icons.Square size={20} className="fill-cyan-700" /> Stop Reading</>) : (<><icons.Volume2 size={20} /> Read Aloud</>)}
                  </button>

                  <button className="w-full py-5 bg-cyan-600 text-white rounded-xl flex justify-center items-center gap-2 font-black shadow-lg shadow-cyan-200 active:scale-95 transition-all mb-12">
                    <icons.ClipboardCheck size={24} />
                    START SERVICE
                  </button>
                </div>
              </div>

              <BottomNav />
            </div>
          )}

          {/* Business Benefit overlay */}
          {(view === 'brief' || view === 'benefit') && (
            <div className="absolute bottom-20 right-4 left-4 z-50">
              {view === 'brief' ? (
                <button onClick={() => setView('benefit')} className="w-full bg-slate-900 text-white p-3 rounded-2xl shadow-2xl flex items-center justify-between border border-pink-500/30">
                  <div className="flex items-center gap-2 px-2">
                    <icons.Zap size={16} className="text-pink-400" />
                    <span className="text-[10px] font-black uppercase tracking-widest">Business Benefit</span>
                  </div>
                  <span style={{ transform: 'rotate(180deg)', display: 'inline-block' }}>‹</span>
                </button>
              ) : (
                <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl border-2 border-pink-500/50">
                  <div className="flex justify-between items-center mb-4">
                    <span className="text-xs font-black text-pink-400 uppercase tracking-widest">Value Insight</span>
                    <button onClick={() => setView('brief')} className="text-slate-400 p-1">✕</button>
                  </div>
                  <p className="text-sm leading-relaxed mb-6 text-slate-200">{scenario.benefit}</p>
                  <div className="space-y-3 pt-4 border-t border-slate-800">
                    <button onClick={toggleSkill} className="w-full p-3 bg-slate-800 rounded-xl text-[10px] font-bold hover:bg-slate-700 flex items-center justify-center gap-2 transition-colors border border-slate-700">
                      <icons.RefreshCw size={14} />
                      {skillLevel === 'standard' ? "SIMULATE LOW-SKILL TECHNICIAN" : "RESET TO EXPERT"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
